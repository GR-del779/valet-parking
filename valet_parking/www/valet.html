<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#1a1d27"/>
<title>Valet Attendant</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#242736;--border:#2e3248;--accent:#6c63ff;--green:#22c55e;--yellow:#f59e0b;--red:#ef4444;--blue:#3b82f6;--text:#f1f5f9;--muted:#94a3b8;--radius:16px;--rs:10px}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:hidden}
#app{height:100vh;display:flex;flex-direction:column}
#login-screen{display:flex;align-items:center;justify-content:center;height:100vh;padding:24px}
.login-card{width:100%;max-width:380px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:40px 32px}
.logo{font-size:56px;text-align:center;margin-bottom:12px}
h1{font-size:24px;font-weight:700;text-align:center}
.sub{text-align:center;color:var(--muted);font-size:14px;margin:4px 0 28px}
.field{margin-bottom:14px}
.field input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:13px 15px;color:var(--text);font-size:16px;outline:none}
.field input:focus{border-color:var(--accent)}
.err{color:var(--red);font-size:13px;text-align:center;margin-top:10px;padding:8px;background:rgba(239,68,68,.1);border-radius:8px;display:none}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px 20px;border:none;border-radius:var(--rs);font-size:15px;font-weight:600;cursor:pointer;width:100%}
.btn:active{opacity:.8}
.btn-primary{background:var(--accent);color:#fff}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-qr{background:var(--surface2);color:var(--text);border:1px solid var(--border);width:52px;min-width:52px;flex-shrink:0;font-size:20px;padding:12px 0}
.icon-btn{background:transparent;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:8px;border-radius:8px;line-height:1}
#main-screen{display:none;flex-direction:column;height:100vh}
header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.app-name{font-size:18px;font-weight:700}
.hdr-r{display:flex;gap:4px}
.notif{display:none;padding:10px 16px;background:linear-gradient(90deg,#7c3aed,var(--accent));align-items:center;justify-content:space-between;flex-shrink:0}
.notif.show{display:flex}
.notif span{font-size:14px;font-weight:500}
.notif-btn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:5px 12px;border-radius:8px;font-size:13px;cursor:pointer}
.search-bar{display:none;padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.search-bar input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:10px 14px;color:var(--text);font-size:15px;outline:none}
.search-bar.open{display:block}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 16px;flex-shrink:0}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:12px 6px;text-align:center;cursor:pointer;border-top-width:3px}
.stat.aw{border-top-color:var(--yellow)}.stat.pk{border-top-color:var(--green)}.stat.rt{border-top-color:var(--red)}.stat.ow{border-top-color:var(--blue)}
.sn{font-size:26px;font-weight:800;line-height:1}
.stat.aw .sn{color:var(--yellow)}.stat.pk .sn{color:var(--green)}.stat.rt .sn{color:var(--red)}.stat.ow .sn{color:var(--blue)}
.sl{font-size:10px;color:var(--muted);margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.tabs{display:flex;overflow-x:auto;scrollbar-width:none;padding:0 12px;gap:4px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:10px 14px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.list{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:8px}
.spinner{display:flex;align-items:center;justify-content:center;padding:60px 0;flex-direction:column;gap:12px;color:var(--muted)}
.spin{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{display:none;flex-direction:column;align-items:center;justify-content:center;padding:60px 0;gap:10px;color:var(--muted);font-size:14px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;display:flex;flex-direction:column;gap:8px;position:relative;overflow:hidden}
.card.urgent{border-color:rgba(239,68,68,.5)}
.card.urgent::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--red)}
.card-top{display:flex;justify-content:space-between;align-items:center}
.token{font-size:17px;font-weight:800;letter-spacing:1px}
.ctime{font-size:12px;color:var(--muted)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.b-aw{background:rgba(245,158,11,.15);color:var(--yellow)}
.b-pk{background:rgba(34,197,94,.15);color:var(--green)}
.b-rt{background:rgba(239,68,68,.15);color:var(--red);animation:pulse 1.5s ease-in-out infinite}
.b-ow{background:rgba(59,130,246,.15);color:var(--blue)}
.b-dv{background:rgba(148,163,184,.15);color:var(--muted)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pills{display:flex;flex-wrap:wrap;gap:6px}
.pill{padding:3px 10px;background:var(--surface2);border-radius:20px;font-size:12px;color:var(--muted)}
.card-actions{display:flex;gap:8px}
.act-btn{flex:1;padding:9px;border:1px solid;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;background:transparent}
.ab-pk{color:var(--green);border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.1)}
.ab-ow{color:var(--blue);border-color:rgba(59,130,246,.3);background:rgba(59,130,246,.1)}
.ab-dv{color:var(--muted);border-color:var(--border)}
.modal{display:none;position:fixed;inset:0;z-index:100;align-items:flex-end}
.modal.open{display:flex}
.overlay{position:absolute;inset:0;background:rgba(0,0,0,.6)}
.sheet{position:relative;width:100%;background:var(--surface);border-radius:24px 24px 0 0;border:1px solid var(--border);max-height:90vh;display:flex;flex-direction:column;animation:up .25s ease}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;flex-shrink:0}
.mhdr{display:flex;justify-content:space-between;align-items:flex-start;padding:14px 20px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.mtoken{font-size:22px;font-weight:800;letter-spacing:2px}
.mbody{overflow-y:auto;padding:14px 20px;flex:1;display:flex;flex-direction:column;gap:12px}
.mfooter{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
.mfooter .btn{flex:1;padding:13px}
.msec{background:var(--surface2);border-radius:var(--rs);padding:12px}
.msec h3{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:8px}
.mrow{display:flex;justify-content:space-between;gap:12px;margin-bottom:6px}
.mrow:last-child{margin-bottom:0}
.mlbl{font-size:13px;color:var(--muted)}.mval{font-size:13px;font-weight:500;text-align:right}
.minput{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 13px;color:var(--text);font-size:15px;outline:none;margin-top:4px}
.minput:focus{border-color:var(--accent)}
.ilbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.tl{display:flex;flex-direction:column}
.tli{display:flex;gap:10px;padding-bottom:14px;position:relative}
.tli:last-child{padding-bottom:0}
.tld{width:10px;height:10px;border-radius:50%;background:var(--border);flex-shrink:0;margin-top:3px;z-index:1}
.tli.done .tld{background:var(--accent);box-shadow:0 0 0 3px rgba(108,99,255,.25)}
.tli:not(:last-child)::before{content:"";position:absolute;left:4px;top:13px;bottom:0;width:2px;background:var(--border)}
.tli.done:not(:last-child)::before{background:var(--accent)}
.tll{font-size:13px;font-weight:600;color:var(--muted)}
.tli.done .tll{color:var(--text)}
.tlt{font-size:11px;color:var(--muted);margin-top:2px}
.qr-sheet{position:relative;width:100%;background:var(--surface);border-radius:24px 24px 0 0;border:1px solid var(--border);padding:30px 20px 40px;display:flex;flex-direction:column;align-items:center;animation:up .25s ease}
#toasts{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:6px;align-items:center;pointer-events:none}
.toast{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 18px;font-size:14px;font-weight:500;max-width:300px;text-align:center;animation:tin .25s ease}
.toast.ok{color:var(--green);border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.1)}
.toast.err{color:var(--red);border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.1)}
@keyframes tin{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
</style>
</head>
<body>
<div id="app">
  <div id="login-screen">
    <div class="login-card">
      <div class="logo">&#x1F697;</div>
      <h1>Valet Attendant</h1>
      <p class="sub">Sign in to manage parking</p>
      <div class="field"><input type="text" id="usr" placeholder="Username or Email" autocomplete="username"/></div>
      <div class="field"><input type="password" id="pwd" placeholder="Password" autocomplete="current-password"/></div>
      <button class="btn btn-primary" id="login-btn">Sign In</button>
      <div class="err" id="login-err"></div>
    </div>
  </div>
  <div id="main-screen">
    <header>
      <div style="display:flex;align-items:center;gap:8px"><span style="font-size:22px">&#x1F697;</span><span class="app-name">Valet</span></div>
      <div class="hdr-r">
        <button class="icon-btn" id="search-btn">&#x1F50D;</button>
        <button class="icon-btn" id="refresh-btn">&#x21BB;</button>
        <button class="icon-btn" id="logout-btn">&#x23FB;</button>
      </div>
    </header>
    <div class="notif" id="notif"><span id="notif-txt"></span><button class="notif-btn" id="notif-act">View</button></div>
    <div class="search-bar" id="search-bar"><input type="text" id="search-input" placeholder="Search token, phone, vehicle..."/></div>
    <div class="stats">
      <div class="stat aw" data-s="Awaiting Parking"><div class="sn" id="c-aw">0</div><div class="sl">Awaiting</div></div>
      <div class="stat pk" data-s="Parked"><div class="sn" id="c-pk">0</div><div class="sl">Parked</div></div>
      <div class="stat rt" data-s="Retrieval Requested"><div class="sn" id="c-rt">0</div><div class="sl">Retrieval</div></div>
      <div class="stat ow" data-s="On The Way"><div class="sn" id="c-ow">0</div><div class="sl">On Way</div></div>
    </div>
    <nav class="tabs">
      <button class="tab active" data-s="">All Active</button>
      <button class="tab" data-s="Awaiting Parking">Awaiting</button>
      <button class="tab" data-s="Parked">Parked</button>
      <button class="tab" data-s="Retrieval Requested">Retrieval</button>
      <button class="tab" data-s="On The Way">On Way</button>
    </nav>
    <div class="list" id="list">
      <div class="spinner" id="spinner"><div class="spin"></div><p>Loading...</p></div>
      <div id="cards"></div>
      <div class="empty" id="empty"><div style="font-size:40px">&#x1F17F;</div><p>No tickets here</p></div>
    </div>
  </div>
  <div class="modal" id="modal">
    <div class="overlay" id="overlay"></div>
    <div class="sheet">
      <div class="handle"></div>
      <div class="mhdr">
        <div><div class="mtoken" id="m-token"></div><div id="m-badge" style="margin-top:4px"></div></div>
        <button class="icon-btn" id="m-close">&#x2715;</button>
      </div>
      <div class="mbody" id="m-body"></div>
      <div class="mfooter" id="m-footer"></div>
    </div>
  </div>
  <div class="modal" id="qr-modal">
    <div class="overlay" id="qr-overlay"></div>
    <div class="qr-sheet">
      <div class="handle"></div>
      <h2 id="qr-token" style="margin-top:16px;font-size:24px;letter-spacing:3px;color:var(--text)"></h2>
      <p style="color:var(--muted);font-size:13px;margin:8px 0 20px">Customer scans to open WhatsApp</p>
      <img id="qr-img" style="width:220px;height:220px;border-radius:12px;border:4px solid white"/>
      <p id="qr-link" style="font-size:11px;color:var(--muted);margin-top:12px;word-break:break-all;text-align:center;max-width:280px"></p>
      <button id="qr-close" style="margin-top:24px;padding:12px 40px;background:transparent;border:1px solid var(--border);border-radius:10px;color:var(--muted);font-size:15px;cursor:pointer;font-weight:600">Close</button>
    </div>
  </div>
</div>
<div id="toasts"></div>
<script>
window.csrf_token = "{{ csrf_token }}";
</script>
<script>
// CSRF token injected by Frappe context
const CSRF_TOKEN = "{{ csrf_token }}";
const $=id=>document.getElementById(id);
const API=(method,params={},post=false)=>{
  const base=`/api/method/valet_parking.valet_parking.api.api.${method}`;
  if(post)return fetch(base,{method:'POST',credentials:'same-origin',headers:{'Content-Type':'application/json','X-Frappe-CSRF-Token':getCsrf()},body:JSON.stringify(params)}).then(r=>r.json()).then(d=>{if(d.exc)throw new Error(d.exc);return d.message});
  const qs=new URLSearchParams(params).toString();
  return fetch(qs?`${base}?${qs}`:base,{credentials:'same-origin'}).then(r=>r.json()).then(d=>{if(d.exc)throw new Error(d.exc);return d.message});
};
function getCsrf() {
    return window.csrf_token;
}
async function checkAuth(){const r=await fetch('/api/method/frappe.auth.get_logged_user',{credentials:'same-origin'});const d=await r.json();return d.message&&d.message!=='Guest';}
async function doLogin(){
  const usr=$('usr').value.trim(),pwd=$('pwd').value;
  $('login-btn').textContent='Signing in…';$('login-btn').disabled=true;$('login-err').style.display='none';
  try{const r=await fetch('/api/method/login',{method:'POST',credentials:'same-origin',headers:{'Content-Type':'application/json'},body:JSON.stringify({usr,pwd})});
    const d=await r.json();if(d.message==='Logged In')showMain();else throw new Error(d.message||'Login failed');
  }catch(e){$('login-err').textContent=e.message;$('login-err').style.display='block';}
  finally{$('login-btn').textContent='Sign In';$('login-btn').disabled=false;}
}
async function doLogout(){await fetch('/api/method/logout',{credentials:'same-origin'});clearInterval(pollTimer);showLogin();}
function showLogin(){$('login-screen').style.display='flex';$('main-screen').style.display='none';}
function showMain(){$('login-screen').style.display='none';$('main-screen').style.display='flex';loadCounts();loadTickets();startPoll();}

async function loadCounts(){
  try{counts=await API('get_dashboard_counts');
    $('c-aw').textContent=counts['Awaiting Parking']||0;$('c-pk').textContent=counts['Parked']||0;
    $('c-rt').textContent=counts['Retrieval Requested']||0;$('c-ow').textContent=counts['On The Way']||0;
  }catch(e){}
}
async function loadTickets(){
  $('spinner').style.display='flex';$('cards').innerHTML='';$('empty').style.display='none';
  try{const p={limit:100};if(curFilter)p.status=curFilter;
    const s=$('search-input').value.trim();if(s)p.search=s;
    const tickets=await API('get_tickets',p);
    $('spinner').style.display='none';
    if(!tickets.length){$('empty').style.display='flex';return;}
    $('cards').innerHTML=tickets.map(renderCard).join('');
    bindCards();
  }catch(e){$('spinner').style.display='none';toast('Failed to load','err');}
}
function renderCard(t){
  const urgent=t.status==='Retrieval Requested';
  const nxt=nextAction(t.status);
  return`<div class="card${urgent?' urgent':''}" data-name="${t.name}">
    <div class="card-top"><span class="token">${t.token_number}</span><span class="ctime">${relTime(t.drop_off_time)}</span></div>
    <div style="display:flex;justify-content:space-between;align-items:center">
      ${badge(t.status)}
      <div class="pills">${t.vehicle_number?`<span class="pill">🚘 ${t.vehicle_number}</span>`:''}${t.parking_location?`<span class="pill">📍 ${t.parking_location}</span>`:''}</div>
    </div>
    ${nxt?`<div class="card-actions"><button class="act-btn ${nxt.cls}" data-action="${nxt.status}" data-name="${t.name}">${nxt.icon} ${nxt.label}</button></div>`:''}
  </div>`;
}
function bindCards(){
  document.querySelectorAll('.card').forEach(c=>c.addEventListener('click',e=>{if(!e.target.closest('.card-actions'))openModal(c.dataset.name);}));
  document.querySelectorAll('[data-action]').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();quickUpdate(b.dataset.name,b.dataset.action);}));
}
async function quickUpdate(name,status){
  try{await API('update_ticket_status',{ticket_name:name,new_status:status},true);toast(`✅ ${status}`,'ok');loadCounts();loadTickets();}
  catch(e){toast(e.message||'Failed','err');}
}
async function openModal(name){
  try{const t=await API('get_ticket',{ticket_name:name});renderModal(t);$('modal').classList.add('open');document.body.style.overflow='hidden';}
  catch(e){toast('Could not load ticket','err');}
}
function closeModal(){$('modal').classList.remove('open');document.body.style.overflow='';}
function renderModal(t){
  $('m-token').textContent=t.token_number;$('m-badge').innerHTML=badge(t.status);
  $('m-body').innerHTML=`
    <div class="msec"><h3>Customer</h3>
      <div class="mrow"><span class="mlbl">Phone</span><span class="mval">${t.customer_phone||'—'}</span></div>
      <div class="mrow"><span class="mlbl">Name</span><span class="mval">${t.customer_name||'—'}</span></div>
    </div>
    <div class="msec"><h3>Vehicle</h3>
      <div class="mrow"><span class="mlbl">Number</span><span class="mval">${t.vehicle_number||'—'}</span></div>
      <div class="mrow"><span class="mlbl">Make</span><span class="mval">${t.vehicle_make||'—'}</span></div>
      <div class="mrow"><span class="mlbl">Color</span><span class="mval">${t.vehicle_color||'—'}</span></div>
      <div class="mrow"><span class="mlbl">Spot</span><span class="mval">${t.parking_location||'—'}</span></div>
    </div>
    <div class="msec"><h3>Timeline</h3>${timeline(t)}</div>
    ${t.status==='Awaiting Parking'?`<div class="msec"><h3>Add Vehicle Details</h3>
      <div class="ilbl">Vehicle Number</div><input class="minput" id="inp-vn" placeholder="e.g. TS09AB1234" value="${t.vehicle_number||''}"/>
      <div class="ilbl" style="margin-top:10px">Parking Spot</div><input class="minput" id="inp-ps" placeholder="e.g. B2-14" value="${t.parking_location||''}"/>
      <div class="ilbl" style="margin-top:10px">Vehicle Color</div><input class="minput" id="inp-vc" placeholder="e.g. Silver" value="${t.vehicle_color||''}"/>
    </div>`:''}`;
  const nxt=nextAction(t.status);
  $('m-footer').innerHTML=nxt
    ?`<button class="btn btn-ghost" id="m-cancel">Cancel</button><button class="btn btn-primary" id="m-act">${nxt.icon} ${nxt.label}</button><button class="btn btn-ghost" id="m-qr" style="width:52px;min-width:52px;flex-shrink:0;font-size:20px;padding:12px 0" title="Show QR">📱</button>`
    :`<button class="btn btn-ghost" id="m-cancel">Close</button><button class="btn btn-ghost" id="m-qr" style="width:52px;min-width:52px;flex-shrink:0;font-size:20px;padding:12px 0" title="Show QR">📱</button>`;
  $('m-cancel').onclick=closeModal;
    const mqr=document.getElementById('m-qr');
    if(mqr) mqr.onclick=()=>{closeModal();showQR(t.name);};
    const ma=$('m-act');
  if(ma)ma.onclick=async()=>{
    const ex={};
    if($('inp-vn'))ex.vehicle_number=$('inp-vn').value;
    if($('inp-ps'))ex.parking_location=$('inp-ps').value;
    if($('inp-vc'))ex.vehicle_color=$('inp-vc').value;
    ma.disabled=true;ma.textContent='Updating…';
    try{await API('update_ticket_status',{ticket_name:t.name,new_status:nxt.status,...ex},true);
      toast(`✅ ${nxt.status}`,'ok');closeModal();loadCounts();loadTickets();
    }catch(e){toast(e.message||'Failed','err');ma.disabled=false;ma.textContent=`${nxt.icon} ${nxt.label}`;}
  };
}
function timeline(t){
  return`<div class="tl">${[['Drop-off',t.drop_off_time],['Parked',t.parked_time],['Retrieval Requested',t.retrieval_requested_time],['On The Way',t.on_the_way_time],['Delivered',t.delivered_time]]
    .map(([l,ts])=>`<div class="tli${ts?' done':''}"><div class="tld"></div><div><div class="tll">${l}</div>${ts?`<div class="tlt">${fmtDT(ts)}</div>`:''}</div></div>`).join('')}</div>`;
}
function setTab(s){curFilter=s;document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.s===s));loadTickets();}
function startPoll(){
  pollTimer=setInterval(async()=>{
    try{const nc=await API('get_dashboard_counts');
      const prev=counts['Retrieval Requested']||0,next=nc['Retrieval Requested']||0;
      if(next>prev){showNotif(`🔔 ${next-prev} new retrieval request!`);loadTickets();}
      counts=nc;$('c-aw').textContent=nc['Awaiting Parking']||0;$('c-pk').textContent=nc['Parked']||0;
      $('c-rt').textContent=nc['Retrieval Requested']||0;$('c-ow').textContent=nc['On The Way']||0;
    }catch(e){}
  },15000);
}
function showNotif(txt){$('notif-txt').textContent=txt;$('notif').classList.add('show');if(navigator.vibrate)navigator.vibrate([200,100,200]);setTimeout(()=>$('notif').classList.remove('show'),10000);}
function toast(msg,type=''){const el=document.createElement('div');el.className=`toast${type?' '+type:''}`;el.textContent=msg;$('toasts').appendChild(el);setTimeout(()=>el.remove(),2800);}
const BADGE={'Awaiting Parking':'b-aw','Parked':'b-pk','Retrieval Requested':'b-rt','On The Way':'b-ow','Delivered':'b-dv'};
const DOTS={'Awaiting Parking':'🟡','Parked':'🟢','Retrieval Requested':'🔴','On The Way':'🔵','Delivered':'⚪'};
function badge(s){return`<span class="badge ${BADGE[s]||''}">${DOTS[s]||''} ${s}</span>`;}
const ACTIONS={'Awaiting Parking':{status:'Parked',label:'Mark Parked',cls:'ab-pk',icon:'✅'},'Retrieval Requested':{status:'On The Way',label:'On The Way',cls:'ab-ow',icon:'🚗'},'On The Way':{status:'Delivered',label:'Delivered',cls:'ab-dv',icon:'🏁'}};
function nextAction(s){return ACTIONS[s]||null;}
function relTime(dt){if(!dt)return'';const d=(Date.now()-new Date(dt).getTime())/1000;if(d<60)return'just now';if(d<3600)return`${Math.floor(d/60)}m ago`;if(d<86400)return`${Math.floor(d/3600)}h ago`;return`${Math.floor(d/86400)}d ago`;}
function fmtDT(dt){if(!dt)return'';const d=new Date(dt);return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})+' · '+d.toLocaleDateString([],{day:'numeric',month:'short'});}
function closeQR(){
  document.getElementById('qr-modal').classList.remove('open');
  document.body.style.overflow='';
}
async function showQR(ticketName){
  try{
    const r=await fetch(`/api/method/valet_parking.valet_parking.qr_code.get_qr_for_ticket?ticket_name=${ticketName}`,{credentials:'same-origin'}).then(r=>r.json());
    const d=r.message;
    document.getElementById('qr-token').textContent=d.token;
    document.getElementById('qr-img').src=`data:image/png;base64,${d.qr_base64}`;
    document.getElementById('qr-link').textContent=d.deeplink;
    document.getElementById('qr-modal').classList.add('open');
    document.body.style.overflow='hidden';
    document.getElementById('qr-close').onclick=closeQR;
    document.getElementById('qr-overlay').onclick=closeQR;
  }catch(e){toast('Could not generate QR','err');}
}
// ── BIND EVENTS ──
document.addEventListener('DOMContentLoaded',async()=>{
  $('login-btn').addEventListener('click',doLogin);
  $('pwd').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
  $('logout-btn').addEventListener('click',doLogout);
  $('refresh-btn').addEventListener('click',()=>{loadCounts();loadTickets();});
  $('search-btn').addEventListener('click',()=>{const b=$('search-bar');b.classList.toggle('open');if(b.classList.contains('open'))$('search-input').focus();});
  $('search-input').addEventListener('input',()=>{clearTimeout(window._st);window._st=setTimeout(loadTickets,350);});
  document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>setTab(t.dataset.s)));
  document.querySelectorAll('.stat').forEach(s=>s.addEventListener('click',()=>setTab(s.dataset.s)));
  $('m-close').addEventListener('click',closeModal);
  $('overlay').addEventListener('click',closeModal);
  $('notif-act').addEventListener('click',()=>{$('notif').classList.remove('show');setTab('Retrieval Requested');});
  const loggedIn=await checkAuth();
  if(loggedIn)showMain();
});
</script>
